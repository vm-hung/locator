syntax = "proto3";

package locator.types;

import "protos/types/endpoint.proto";

option go_package = "github.com/hunkvm/locator/pkg/proto/types";

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_HEALTHY = 1;
  HEALTH_STATUS_UNHEALTHY = 2;
}

message HealthConfig {
  string service = 1;
  Endpoint address = 2;
}
